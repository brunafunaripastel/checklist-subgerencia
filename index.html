<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Koncluí – Pastel da Camila v4</title>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<meta http-equiv="Expires" content="0"/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
/* ═══════════════════════════════════════════
   KONCLUÍ · DESIGN SYSTEM v5
   iFood-inspired · Mobile first · Multi-device
═══════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --brand:#EA1D2C;--brand-dark:#C0111E;--brand-light:#FFF0F1;--brand-mid:#FCCDD0;
  --bg:#F4F4F6;--surface:#FFF;--surface2:#FAFAFA;
  --ink:#111827;--ink2:#4B5563;--ink3:#9CA3AF;
  --line:#E5E7EB;--line2:#F3F4F6;
  --ok:#16A34A;--ok-bg:#F0FDF4;--ok-line:#BBF7D0;
  --warn:#D97706;--warn-bg:#FFFBEB;--warn-line:#FDE68A;
  --danger:#DC2626;--danger-bg:#FEF2F2;--danger-line:#FECACA;
  --info:#1D4ED8;--info-bg:#EFF6FF;--info-line:#BFDBFE;
  --r4:4px;--r8:8px;--r12:12px;--r16:16px;--r99:99px;
  --sh1:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  --sh2:0 4px 12px rgba(0,0,0,.08),0 1px 4px rgba(0,0,0,.04);
  --sh3:0 8px 24px rgba(0,0,0,.10),0 2px 8px rgba(0,0,0,.06);
}
html{font-size:14px;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;padding-bottom:72px}
*{font-family:inherit}
button{cursor:pointer;border:none;outline:none;background:transparent;-webkit-tap-highlight-color:transparent}
button:focus-visible{outline:2px solid var(--brand);outline-offset:2px;border-radius:4px}
a{color:inherit;text-decoration:none}
textarea{font-family:inherit}

/* ═══ LOGIN ═══════════════════════════════ */
.login-bg{
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
  background:radial-gradient(ellipse at 60% 0%, #3D0007 0%, #1A0003 40%, #0D0D0D 100%)
}
.login-card{
  background:var(--surface);border-radius:var(--r16);padding:32px 28px;
  width:100%;max-width:360px;box-shadow:0 32px 64px rgba(0,0,0,.45)
}
.login-logo{text-align:center;margin-bottom:24px}
.login-emoji{font-size:44px;line-height:1;display:block;margin-bottom:10px}
.login-name{font-family:'Sora',sans-serif;font-size:20px;font-weight:800;color:var(--ink)}
.login-sub{font-size:11px;color:var(--ink3);margin-top:3px}
.login-powered{font-size:10px;color:#C0C0C0;margin-top:6px}
.f-group{margin-bottom:14px}
.f-label{display:block;font-size:11px;font-weight:600;color:var(--ink2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.f-input{
  width:100%;border:1.5px solid var(--line);border-radius:var(--r8);
  padding:10px 13px;font-size:14px;color:var(--ink);background:var(--surface2);
  transition:border-color .15s,box-shadow .15s
}
.f-input:focus{border-color:var(--brand);background:var(--surface);outline:none;box-shadow:0 0 0 3px rgba(234,29,44,.1)}
.f-input.err{border-color:var(--brand)}
.f-error{font-size:11px;color:var(--danger);margin-top:4px;font-weight:500}
.btn-brand{
  width:100%;padding:12px;background:var(--brand);color:#fff;border-radius:var(--r8);
  font-family:'Sora',sans-serif;font-size:14px;font-weight:700;letter-spacing:.2px;
  transition:background .15s,transform .1s;margin-top:4px
}
.btn-brand:hover{background:var(--brand-dark)}
.btn-brand:active{transform:scale(.99)}
.btn-brand:disabled{opacity:.4;cursor:not-allowed;transform:none}
.alert-box{
  background:var(--danger-bg);border:1px solid var(--danger-line);color:#991B1B;
  border-radius:var(--r8);padding:10px 13px;font-size:12px;font-weight:500;margin-bottom:14px
}

/* ═══ HEADER ════════════════════════════ */
.hdr{
  background:var(--brand);color:#fff;height:52px;padding:0 16px;
  display:flex;align-items:center;position:sticky;top:0;z-index:100;
  box-shadow:0 2px 8px rgba(180,0,20,.25)
}
.hdr-inner{
  width:100%;max-width:720px;margin:0 auto;
  display:flex;align-items:center;justify-content:space-between;gap:10px
}
.hdr-left{display:flex;flex-direction:column;line-height:1}
.hdr-eyebrow{font-size:9px;font-weight:600;letter-spacing:2px;opacity:.6;text-transform:uppercase;margin-bottom:2px}
.hdr-title{font-family:'Sora',sans-serif;font-size:15px;font-weight:800}
.hdr-right{display:flex;align-items:center;gap:6px}
.hdr-chip{
  background:rgba(255,255,255,.15);border-radius:var(--r99);
  padding:4px 11px;font-size:11px;font-weight:600;display:flex;align-items:center;gap:4px
}
.hdr-btn{
  background:transparent;border:1px solid rgba(255,255,255,.28);color:rgba(255,255,255,.85);
  border-radius:var(--r99);padding:4px 11px;font-size:11px;font-weight:600;transition:background .13s
}
.hdr-btn:hover{background:rgba(255,255,255,.12)}

/* ═══ PAGE WRAPPER ══════════════════════ */
.page{max-width:720px;margin:0 auto}

/* ═══ DAY BADGE ═════════════════════════ */
.day-badge{
  display:inline-flex;align-items:center;gap:6px;
  margin:12px 16px 0;background:var(--surface);border:1px solid var(--line);
  border-radius:var(--r99);padding:5px 13px;font-size:11px;font-weight:600;color:var(--ink2)
}
.day-dot{width:6px;height:6px;border-radius:50%;background:var(--ok);flex-shrink:0}

/* ═══ CARD ══════════════════════════════ */
.card{
  background:var(--surface);border-radius:var(--r12);border:1px solid var(--line);
  box-shadow:var(--sh1);padding:16px;margin:10px 16px 0
}
.card-title{
  font-family:'Sora',sans-serif;font-size:13px;font-weight:700;color:var(--ink);
  margin-bottom:14px;display:flex;align-items:center;gap:6px
}

/* ═══ TURNO SELECTOR ════════════════════ */
.turno-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.turno-btn{
  padding:18px 12px;border-radius:var(--r12);border:2px solid var(--line);
  background:var(--surface);text-align:center;transition:all .15s;cursor:pointer;
  position:relative;overflow:hidden
}
.turno-btn:hover{border-color:#CBD5E0;background:var(--surface2);transform:translateY(-1px);box-shadow:var(--sh1)}
.turno-btn.active{border-color:var(--brand);background:var(--brand-light)}
.turno-btn.active::after{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--brand)
}
.turno-icon{font-size:26px;display:block;margin-bottom:7px}
.turno-label{font-family:'Sora',sans-serif;font-size:14px;font-weight:700;color:var(--ink2)}
.turno-btn.active .turno-label{color:var(--brand)}

/* ═══ CONTEXT QUESTIONS ════════════════ */
.ctx-section-hd{
  font-size:10px;font-weight:700;color:var(--ink3);text-transform:uppercase;
  letter-spacing:.6px;padding:10px 0 6px;border-bottom:1px solid var(--line);margin-bottom:0
}
.ctx-row{
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding:9px 0;border-bottom:1px solid var(--line2)
}
.ctx-row:last-child{border-bottom:none}
.ctx-q{font-size:13px;font-weight:500;color:var(--ink);flex:1;line-height:1.4}
.ctx-hint{font-size:10px;color:var(--ink3);margin-top:1px}
.ctx-toggle{display:flex;gap:5px;flex-shrink:0}
.ctx-btn{
  padding:5px 14px;border-radius:var(--r99);border:1.5px solid var(--line);
  background:var(--surface);font-size:12px;font-weight:600;color:var(--ink2);
  transition:all .13s;min-width:44px;text-align:center
}
.ctx-btn:hover{border-color:#9CA3AF}
.ctx-btn.yes{border-color:var(--ok);background:var(--ok-bg);color:var(--ok)}
.ctx-btn.no{border-color:#9CA3AF;background:#F9FAFB;color:#6B7280}

/* ═══ START BUTTON ══════════════════════ */
.start-wrap{padding:12px 16px 0}
.start-btn{
  width:100%;padding:14px;background:var(--brand);color:#fff;border-radius:var(--r12);
  font-family:'Sora',sans-serif;font-size:14px;font-weight:700;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:background .15s,transform .1s;letter-spacing:.2px
}
.start-btn:hover{background:var(--brand-dark)}
.start-btn:active{transform:scale(.99)}
.start-count{font-size:11px;color:var(--ink3);text-align:center;margin-top:6px}

/* ═══ PROGRESS ══════════════════════════ */
.prog-card{
  background:var(--surface);border:1px solid var(--line);border-radius:var(--r12);
  box-shadow:var(--sh1);padding:14px 16px;margin:10px 16px 0
}
.prog-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.prog-lbl{font-size:11px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.4px}
.prog-pct{font-family:'Sora',sans-serif;font-size:20px;font-weight:800;color:var(--brand)}
.prog-track{background:var(--line2);border-radius:var(--r99);height:5px;overflow:hidden;margin-bottom:12px}
.prog-fill{height:100%;border-radius:var(--r99);background:var(--brand);transition:width .4s ease}
.prog-stats{display:grid;grid-template-columns:repeat(4,1fr);text-align:center}
.pv{font-family:'Sora',sans-serif;font-size:18px;font-weight:800;line-height:1}
.pl{font-size:9px;color:var(--ink3);font-weight:500;margin-top:2px;text-transform:uppercase}

/* ═══ STATUS PANEL ══════════════════════ */
.status-panel{
  background:var(--surface);border:1px solid var(--line);border-radius:var(--r12);
  box-shadow:var(--sh1);padding:11px 16px;margin:8px 16px 0;
  display:flex;align-items:center;justify-content:space-between;gap:10px
}
.s-badge{border-radius:var(--r99);padding:3px 10px;font-size:11px;font-weight:600;white-space:nowrap}
.s-ok{background:var(--ok-bg);color:var(--ok)}
.s-warn{background:var(--warn-bg);color:var(--warn)}
.s-err{background:var(--danger-bg);color:var(--danger)}
.s-stats{display:flex;gap:16px}
.sv{font-family:'Sora',sans-serif;font-size:16px;font-weight:800;line-height:1}
.sl{font-size:9px;color:var(--ink3);text-transform:uppercase;margin-top:1px}

/* ═══ SECTION ACCORDION ════════════════ */
.section{margin:8px 16px 0;border-radius:var(--r12);overflow:hidden;border:1px solid var(--line);box-shadow:var(--sh1)}
.sec-head{
  padding:12px 16px;background:var(--surface);display:flex;align-items:center;
  justify-content:space-between;cursor:pointer;user-select:none;transition:background .12s
}
.sec-head:hover{background:var(--surface2)}
.sec-head.has-err{background:var(--danger-bg);border-left:3px solid var(--brand)}
.sec-hl{display:flex;align-items:center;gap:9px}
.sec-icon{font-size:16px;width:22px;text-align:center;flex-shrink:0}
.sec-name{font-family:'Sora',sans-serif;font-size:13px;font-weight:700;color:var(--ink)}
.sec-meta{font-size:10px;color:var(--ink3);margin-top:1px}
.sec-right{display:flex;align-items:center;gap:8px}
.sec-badge{border-radius:var(--r99);padding:2px 9px;font-size:10px;font-weight:600}
.sb-d{background:var(--line2);color:var(--ink2)}
.sb-ok{background:var(--ok-bg);color:var(--ok)}
.sb-err{background:var(--danger-bg);color:var(--danger)}
.sec-chev{font-size:11px;color:var(--ink3);transition:transform .2s}
.sec-chev.open{transform:rotate(180deg)}

/* ═══ CHECKLIST ITEM ════════════════════ */
.chk-item{padding:13px 16px;border-top:1px solid var(--line2);background:var(--surface)}
.chk-item:first-child{border-top:none}
.chk-item.lc{border-left:3px solid var(--brand)}
.chk-item.li{border-left:3px solid var(--warn)}
.chk-item.lr{border-left:3px solid var(--info-line)}
/* Level badge */
.lvl{display:inline-flex;align-items:center;font-size:9px;font-weight:700;border-radius:var(--r4);padding:2px 6px;margin-bottom:6px;text-transform:uppercase;letter-spacing:.3px}
.lv-c{background:var(--danger-bg);color:var(--danger)}
.lv-i{background:var(--warn-bg);color:var(--warn)}
.lv-r{background:var(--info-bg);color:var(--info)}
/* Item content */
.chk-title{font-size:14px;font-weight:600;color:var(--ink);line-height:1.4;margin-bottom:3px}
.chk-desc{font-size:12px;color:var(--ink2);line-height:1.5;margin-bottom:11px}
/* Answer buttons — touch-friendly */
.ans-row{display:flex;gap:6px}
.ans-sim{
  flex:1;display:flex;align-items:center;justify-content:center;gap:6px;
  padding:10px 12px;border-radius:var(--r8);border:1.5px solid var(--line);
  background:var(--surface2);font-size:13px;font-weight:600;color:var(--ink2);
  transition:all .13s;cursor:pointer;min-height:42px
}
.ans-nao{
  flex:1;display:flex;align-items:center;justify-content:center;gap:6px;
  padding:10px 12px;border-radius:var(--r8);border:1.5px solid var(--line);
  background:var(--surface2);font-size:13px;font-weight:600;color:var(--ink2);
  transition:all .13s;cursor:pointer;min-height:42px
}
.ans-sim:hover{border-color:var(--ok-line);background:var(--ok-bg);color:var(--ok)}
.ans-nao:hover{border-color:var(--danger-line);background:var(--danger-bg);color:var(--danger)}
.ans-sim.sel{border-color:var(--ok);background:var(--ok);color:#fff}
.ans-nao.sel{border-color:var(--brand);background:var(--brand);color:#fff}
.ans-icon{font-size:14px;line-height:1}
.req-msg{font-size:11px;color:var(--danger);margin-top:5px;font-weight:500;display:flex;align-items:center;gap:4px}

/* ═══ NEG FIELDS — chips ════════════════ */
.neg-wrap{
  background:#FFFBFB;border:1px solid var(--danger-line);border-radius:var(--r12);
  padding:13px;margin-top:10px;display:flex;flex-direction:column;gap:11px
}
.neg-lbl{font-size:10px;font-weight:700;color:var(--danger);text-transform:uppercase;letter-spacing:.4px}
.chip-row{display:flex;flex-wrap:wrap;gap:5px}
.chip{
  padding:5px 12px;border-radius:var(--r99);border:1.5px solid var(--line);
  background:var(--surface);font-size:11px;font-weight:600;color:var(--ink2);
  cursor:pointer;transition:all .12s;white-space:nowrap
}
.chip:hover{border-color:#9CA3AF;background:var(--surface2)}
.chip.sc{border-color:var(--brand);background:var(--brand);color:#fff}
.chip.sr{border-color:var(--info);background:var(--info);color:#fff}
.chip.sih{border-color:var(--danger);background:var(--danger);color:#fff}
.chip.sim{border-color:var(--warn);background:var(--warn);color:#fff}
.chip.sil{border-color:var(--ok);background:var(--ok);color:#fff}
.chip.sp{border-color:var(--warn);background:var(--warn);color:#fff}
.neg-inline{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.neg-inline-lbl{font-size:10px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.3px;white-space:nowrap}
.neg-obs{
  width:100%;border:1.5px solid var(--line);border-radius:var(--r8);
  padding:8px 10px;font-size:13px;color:var(--ink);background:var(--surface);
  resize:none;min-height:40px;line-height:1.4;transition:border-color .15s
}
.neg-obs:focus{border-color:var(--brand);outline:none}

/* ═══ HINT BANNER ══════════════════════ */
.hint{
  margin:6px 16px 0;padding:7px 12px;border-radius:var(--r8);
  font-size:11px;font-weight:600;display:flex;align-items:center;gap:5px;
  border-width:1px;border-style:solid
}

/* ═══ FINAL FIELDS ══════════════════════ */
.tog-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 0;border-bottom:1px solid var(--line2)
}
.tog-row:last-child{border-bottom:none}
.tog-lbl{font-size:13px;font-weight:500;color:var(--ink)}
.tog-btns{display:flex;gap:5px}
.tog{
  padding:5px 13px;border-radius:var(--r99);border:1.5px solid var(--line);
  background:var(--surface);font-size:11px;font-weight:600;color:var(--ink2);transition:all .13s
}
.tog.yes{border-color:var(--brand);background:var(--brand);color:#fff}
.tog.no{border-color:var(--ok);background:var(--ok);color:#fff}

/* ═══ DECLARATION ══════════════════════ */
.decl-box{
  background:var(--ok-bg);border:1.5px solid var(--ok-line);border-radius:var(--r12);
  padding:13px;display:flex;gap:10px;align-items:flex-start;cursor:pointer;transition:all .13s
}
.decl-box:hover{background:#E8FAF0}
.decl-box.on{border-color:var(--ok);background:#DFFAEB}
.decl-chk{
  width:19px;height:19px;border-radius:4px;border:2px solid var(--ok);
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  background:var(--surface);margin-top:1px;transition:all .13s
}
.decl-chk.on{background:var(--ok);border-color:var(--ok)}
.decl-txt{font-size:12px;font-weight:500;color:var(--ok);line-height:1.5}

/* ═══ VALIDATION ════════════════════════ */
.val-wrap{
  background:var(--danger-bg);border:1px solid var(--danger-line);
  border-radius:var(--r12);padding:13px 16px;margin:8px 16px 0
}
.val-title{font-family:'Sora',sans-serif;font-size:12px;font-weight:700;color:var(--danger);margin-bottom:8px}
.val-item{
  font-size:11px;color:#B91C1C;padding:4px 0;border-bottom:1px solid var(--danger-line);
  display:flex;gap:6px;align-items:flex-start;line-height:1.4
}
.val-item:last-child{border-bottom:none}
.val-item::before{content:'·';font-size:16px;line-height:.8;color:var(--danger);flex-shrink:0}

/* ═══ FAB ════════════════════════════ */
.fab{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:var(--surface);border-top:1px solid var(--line);
  padding:10px 16px;display:flex;gap:8px;box-shadow:0 -2px 10px rgba(0,0,0,.07)
}
.fab-inner{width:100%;max-width:720px;margin:0 auto;display:flex;gap:8px}
.fab-save{
  flex:0 0 auto;padding:10px 16px;border-radius:var(--r8);
  background:var(--surface2);border:1.5px solid var(--line);
  font-family:'Sora',sans-serif;font-size:12px;font-weight:700;color:var(--ink2);
  display:flex;align-items:center;gap:5px;transition:all .13s
}
.fab-save:hover{background:var(--line)}
.fab-send{
  flex:1;padding:11px;border-radius:var(--r8);background:var(--brand);color:#fff;
  font-family:'Sora',sans-serif;font-size:14px;font-weight:700;
  display:flex;align-items:center;justify-content:center;gap:6px;
  transition:background .13s;letter-spacing:.2px
}
.fab-send:hover{background:var(--brand-dark)}
.fab-send:disabled{opacity:.4;cursor:not-allowed}
.fab-del{
  flex:0 0 auto;padding:10px 12px;border-radius:var(--r8);
  background:var(--surface2);border:1.5px solid var(--line);
  font-size:16px;transition:all .13s
}
.fab-del:hover{background:var(--danger-bg);border-color:var(--danger-line)}

/* ═══ TOAST ══════════════════════════ */
.toast{
  position:fixed;top:64px;left:50%;transform:translateX(-50%);
  background:#111;color:#fff;padding:8px 18px;border-radius:var(--r99);
  font-size:12px;font-weight:500;z-index:9999;box-shadow:var(--sh3);
  opacity:0;transition:opacity .22s;pointer-events:none;white-space:nowrap
}
.toast.on{opacity:1}

/* ═══ SENDING OVERLAY ═══════════════ */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:800;display:flex;align-items:center;justify-content:center;padding:20px}
.overlay-card{background:var(--surface);border-radius:var(--r16);padding:26px 22px;width:100%;max-width:280px;text-align:center;box-shadow:var(--sh3)}
.spin{width:34px;height:34px;border:3px solid var(--line2);border-top-color:var(--brand);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 13px}
@keyframes spin{to{transform:rotate(360deg)}}
.ol-title{font-family:'Sora',sans-serif;font-size:15px;font-weight:800;margin-bottom:3px}

function resolveDesc(item, ctx){
  if(typeof item.d === 'function') return item.d(ctx);
  return item.d || '';
}

// Filtra itens por turno, dia da semana e contexto
function filterItems(allItems, turno, ctx){
  const dow = new Date().getDay(); // 0=dom 1=seg 2=ter 3=qua 4=qui 5=sex 6=sab
  return allItems
    .filter(item=>{
      if(item.t !== turno) return false;
      // filtro por dia da semana
      if(item.dias && !item.dias.includes(dow)) return false;
      // filtro por contexto
      if(item.cond==='delivery' && ctx.delivery!=='sim') return false;
      if(item.cond==='novato'   && ctx.novato!=='sim')   return false;
      if(item.cond==='falta'    && ctx.falta!=='sim')    return false;
      if(item.cond==='troco'      && ctx.troco!=='sim')      return false;
      if(item.cond==='feriado'    && ctx.feriado!=='sim')    return false;
      if(item.cond==='equipamento'&& ctx.equipamento!=='sim') return false;
      if(item.cond==='promocao'   && ctx.promocao!=='sim')   return false;
      if(item.cond==='chuva'      && ctx.chuva!=='sim')      return false;
      return true;
    })
    // injeta descrição resolvida
    .map(item=>({...item, d: resolveDesc(item, ctx)}));
}

function Toast({msg,show}){return <div className={`toast${show?' on':''}`}>{msg}</div>;}
function useToast(){
  const [t,sT]=useState({show:false,msg:''});const r=useRef();

function Login({onLogin}){
  const [login,setLogin]=useState('');const [pwd,setPwd]=useState('');
  const [err,setErr]=useState('');const [loading,setLoading]=useState(false);
  async function go(){
    setErr('');if(!login.trim()||!pwd.trim()){setErr('Preencha todos os campos.');return;}
    setLoading(true);
    const hashPw=async(s)=>{try{const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');}catch{return s;}};
    const hashed=await hashPw(pwd.trim());
    const users=getUsers(),key=login.trim().toLowerCase(),user=users[key];
    if(!user||(user.pwd!==hashed&&user.pwd!==pwd.trim())){setErr('Login ou senha incorretos.');setLoading(false);return;}
    onLogin(user,key);setLoading(false);
  }
  return(
    <div className="login-bg">
      <div className="login-card">
        <div className="login-logo">
          <span className="login-emoji">🥟</span>
          <div className="login-name">Pastel da Camila</div>
          <div className="login-sub">Sistema Operacional de Franquias</div>
          <div className="login-powered">Powered by Koncluí · Checklists Inteligentes</div>
        </div>
        {err&&<div className="alert-box">⚠️ {err}</div>}
        <div className="f-group"><label className="f-label">Login</label><input className="f-input" value={login} onChange={e=>setLogin(e.target.value)} placeholder="Seu login" onKeyDown={e=>e.key==='Enter'&&go()}/></div>
        <div className="f-group"><label className="f-label">Senha</label><input className="f-input" type="password" value={pwd} onChange={e=>setPwd(e.target.value)} placeholder="••••••" onKeyDown={e=>e.key==='Enter'&&go()}/></div>
        <button className="btn-brand" onClick={go} disabled={loading}>{loading?'Verificando...':'ENTRAR →'}</button>
        <div style={{marginTop:16,textAlign:'center',fontSize:11,color:'var(--ink3)'}}>Acesso restrito · v3.0 · Koncluí 2025</div>
      </div>
    </div>
  );
}

}function ChkItem({item,resp,onAns,showErr}){
  const lvlCls={critico:'lvc',importante:'lvi',rotina:'lvr'}[item.n]||'lvr';
  const itemCls={critico:'lc',importante:'li',rotina:'lr'}[item.n]||'lr';

    if(resp!=='nao'){

  return(
    <div className={`chk-item ${itemCls}${resp==='nao'?' nao-sel':''}${flash?' nao-flash':''}`}>

              style={{width:'100%',border:'1.5px solid #E5E7EB',borderRadius:10,padding:'11px 13px',fontSize:13,color:'#111',background:'#fff',resize:'none',minHeight:88,fontFamily:'inherit',lineHeight:1.6}}/>
          </div>
        )}
        <button onClick={handleConfirm}
          style={{width:'100%',padding:15,background:'#EA1D2C',color:'#fff',borderRadius:12,fontFamily:"'Sora',sans-serif",fontSize:15,fontWeight:700,cursor:'pointer',border:'none'}}>
          🚀 Enviar relatório do turno
        </button>
        <div style={{textAlign:'center',fontSize:11,color:'#9CA3AF',marginTop:8}}>Enviando como <b>{nome}</b> · e-mail e WhatsApp da gestão</div>
      </div>
    </div>
  );
}

function ChecklistScreen({user,onLogout,onBack}){
  const CK_USER_KEY=`konclui_ck_${user.login}`;
  const [screen,setScreen]=useState('entry'); // entry | checklist | ocorrencias | summary
  const [ident,setIdent]=useState(null);
  const [ctx,setCtx]=useState({delivery:'',novato:'',falta:'',troco:'',feriado:'',equipamento:'',promocao:'',chuva:''});
  const [resps,setResps]=useState({});
  const [negs,setNegs]=useState({});
  const [ff,setFF]=useState({obsGerais:'',pendProx:'',manut:'',manutDet:'',compra:'',compraDet:'',disc:'',discDet:'',tec:'',tecDet:''});
  const [decl,setDecl]=useState({checked:false,nome:user.name,hora:''});
  const [showErr,setShowErr]=useState(false);
  const [valErrs,setValErrs]=useState([]);
  const [sending,setSending]=useState(false);
  const [sendSteps,setSendSteps]=useState([]);
  const [webhookOk,setWebhookOk]=useState(true);
  const [toast,showToast]=useToast();

  useEffect(()=>{
    try{
      const s=JSON.parse(localStorage.getItem(CK_USER_KEY));
      if(s?.ident){setIdent(s.ident);setResps(s.resps||{});setNegs(s.negs||{});setFF(s.ff||ff);setScreen('checklist');}
    }catch{}
  },[]);

  useEffect(()=>{
    if(!ident)return;
    localStorage.setItem(CK_USER_KEY,JSON.stringify({ident,resps,negs,ff}));
  },[ident,resps,negs,ff]);

  const items=useMemo(()=>ident?filterItems(ITEMS,ident.turno==='manha'?'manha':'tarde',ctx):[],[ident,ctx]);
  const secs=useMemo(()=>ident?.turno==='manha'?SEC_MANHA:SEC_TARDE,[ident]);

  const stats=useMemo(()=>{
    const tot=items.length,resp=items.filter(i=>resps[i.id]).length;
    const fl=items.filter(i=>resps[i.id]==='nao').length;
    const cr=items.filter(i=>i.n==='critico'&&resps[i.id]==='nao').length;
    return{tot,resp,fl,cr,pend:tot-resp,pct:tot>0?Math.round(resp/tot*100):0};
  },[items,resps]);

  const statusInfo=useMemo(()=>{
    if(stats.cr>0)return{txt:'Crítico',cls:'sk'};
    if(stats.fl>0)return{txt:'Com Ressalvas',cls:'sa'};
    if(stats.pend>0)return{txt:'Em Andamento',cls:'sa'};
    return{txt:'Conforme',cls:'sc'};
  },[stats]);

  function handleWhatsApp(){
    const txt=buildText();
    const encoded=encodeURIComponent(txt);
    window.open('https://wa.me/5511940366586?text='+encoded,'_blank');
  }

  function setF(k,v){setFF(f=>({...f,[k]:v}));}
  function onAns(id,val){setResps(r=>({...r,[id]:val}));if(val!=='nao')setNegs(n=>{const c={...n};delete c[id];return c;});}
  function onNeg(id,d){setNegs(n=>({...n,[id]:d}));}

  function validate(){
    const errs=[];
    items.forEach(item=>{
      if(!resps[item.id]) errs.push(`"${item.ti}" — sem resposta`);
    });
    return errs;
  }

  async function handleEnviar(nomeFromOcc){
    if(nomeFromOcc) setDecl(d=>({...d,nome:nomeFromOcc,checked:true}));
    const errs=validate();setValErrs(errs);
    if(errs.length>0){setScreen('checklist');setShowErr(true);window.scrollTo({top:0,behavior:'smooth'});return;}
    const hora=nowTime();setDecl(d=>({...d,hora}));

    const falhasItems=items.filter(i=>resps[i.id]==='nao');
    const total=items.length,falhas=falhasItems.length;
    const criticos=falhasItems.filter(i=>i.n==='critico').length;
    const pendencias=Object.values(negs).filter(d=>d?.prox==='sim').length;
    const score=Math.max(0,Math.round(100-(falhas/total*40)-(criticos*10)-(pendencias*5)));
    const status=criticos>0?'Crítico':falhas>0?'Com Ressalvas':'Conforme';

    setSending(true);
    setSendSteps([
      {label:'Validando dados...',st:'go'},
      {label:'Salvando registro local...',st:'wait'},
      {label:'Enviando para central (Make)...',st:'wait'},
      {label:'Gerando confirmação...',st:'wait'},
    ]);

    await new Promise(r=>setTimeout(r,600));
    setSendSteps(s=>{const c=[...s];c[0]={...c[0],st:'ok'};c[1]={...c[1],st:'go'};return c;});

    // Save locally
    try{
      const all=JSON.parse(localStorage.getItem(CK_KEY)||'[]');
      all.push({id:Date.now(),user:user.name,login:user.login,turno:ident.turno,data:todayISO(),dataFmt:ident.data,hora,score,total,falhas,criticos,pendencias,status:status.toLowerCase().replace(/ /g,'_'),ff,negs,isDemo:false});
      localStorage.setItem(CK_KEY,JSON.stringify(all.slice(-300)));
    }catch{}

    await new Promise(r=>setTimeout(r,400));
    setSendSteps(s=>{const c=[...s];c[1]={...c[1],st:'ok'};c[2]={...c[2],st:'go'};return c;});

    // Build text payload for webhook (formatted like WhatsApp)
    const sep='━━━━━━━━━━━━━━━━━━━━━━━━━━';
    const tLabel=ident.turno==='manha'?'Manhã':'Tarde/Noite';
    const wppLines=[
      '🥟 PASTEL DA CAMILA – FECHAMENTO DE TURNO',
      '📋 Sistema Koncluí',sep,
      `👤 Responsável: ${user.name}`,
      `🕐 Turno: ${tLabel}`,
      `📅 Data: ${ident.data}  ⏰ Início: ${ident.horaInicio}  Fechamento: ${hora}`,sep,
      `📊 Status: ${status}`,
      `🏆 Score do Turno: ${score}/100`,sep,
      `✅ Concluídos: ${items.filter(i=>resps[i.id]).length}/${total}`,
      `❌ Falhas: ${falhas}`,
      `🔴 Críticos c/ problema: ${criticos}`,
      `⏳ Pendências p/ próx. turno: ${pendencias}`,
    ];
    if(falhasItems.length>0){
      wppLines.push('',sep,'🔴 FALHAS REGISTRADAS',sep);
      falhasItems.forEach((item,idx)=>{
        const n=negs[item.id]||{};
        wppLines.push(`${idx+1}. [${item.n.toUpperCase()}] ${item.ti}`);
        wppLines.push(`   Seção: ${item.s}`);
        if(n.causa) wppLines.push(`   Causa: ${n.causa}`);if(n.just) wppLines.push(`   Obs: ${n.just}`);
        if(n.acao) wppLines.push(`   Ação: ${n.acao}`);
        if(n.resp) wppLines.push(`   Responsável: ${n.resp}${n.prazo?' | Prazo: '+n.prazo:''}`);
        if(n.escalar==='sim') wppLines.push(`   ESCALADO para liderança`);
        if(n.prox==='sim') wppLines.push(`   ⚠️ PENDÊNCIA PRÓXIMO TURNO: ${n.det||''}`);
        wppLines.push('');
      });
    }
    if(ff.obsGerais) wppLines.push(sep,`📝 OCORRÊNCIAS DO TURNO: ${ff.obsGerais}`);
    wppLines.push(sep,`✍️ ${decl.nome} · ${hora} · Koncluí`);
    const textoFinal=wppLines.join('\n');

    // Build email HTML
    const tLbl=ident.turno==='manha'?'Manhã':'Tarde/Noite';
    const corSt=criticos>0?'#DC2626':falhas>0?'#D97706':'#16A34A';
    let eHtml=`<div style="font-family:Inter,Arial,sans-serif;max-width:600px;margin:0 auto;background:#fff;border-radius:12px;overflow:hidden;border:1px solid #E5E7EB">
  <div style="background:linear-gradient(135deg,#B5001A,#EA1D2C);color:#fff;padding:20px 24px">
    <div style="font-size:11px;opacity:.6;letter-spacing:1.5px;text-transform:uppercase">Pastel da Camila · Koncluí</div>
    <div style="font-size:20px;font-weight:900;margin:4px 0 2px">🥟 Relatório de Turno</div>
    <div style="font-size:12px;opacity:.75">${user.name} · ${tLbl} · ${ident.data}</div>
    <div style="display:inline-block;background:rgba(255,255,255,.15);border-radius:99px;padding:4px 14px;font-size:11px;font-weight:700;margin-top:8px">${status} · Score: ${score}/100</div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);border-bottom:1px solid #E5E7EB">
    <div style="padding:12px 8px;text-align:center;border-right:1px solid #E5E7EB"><div style="font-size:22px;font-weight:900;color:#EA1D2C">${score}</div><div style="font-size:9px;color:#9CA3AF;text-transform:uppercase">Score</div></div>
    <div style="padding:12px 8px;text-align:center;border-right:1px solid #E5E7EB"><div style="font-size:22px;font-weight:900;color:#16A34A">${items.filter(i=>resps[i.id]==='sim').length}</div><div style="font-size:9px;color:#9CA3AF;text-transform:uppercase">Sim</div></div>
    <div style="padding:12px 8px;text-align:center;border-right:1px solid #E5E7EB"><div style="font-size:22px;font-weight:900;color:#DC2626">${falhas}</div><div style="font-size:9px;color:#9CA3AF;text-transform:uppercase">Falhas</div></div>
    <div style="padding:12px 8px;text-align:center"><div style="font-size:22px;font-weight:900;color:#D97706">${criticos}</div><div style="font-size:9px;color:#9CA3AF;text-transform:uppercase">Críticos</div></div>
  </div>`;
    if(falhasItems.length>0){
      eHtml+=`<div style="padding:16px 20px"><div style="font-size:12px;font-weight:700;color:#DC2626;margin-bottom:10px">🔴 FALHAS (${falhasItems.length})</div>`;
      falhasItems.forEach(item=>{
        const n=negs[item.id]||{};
        eHtml+=`<div style="background:#FFF8F8;border-radius:8px;padding:10px 12px;margin-bottom:8px;border-left:3px solid #EA1D2C"><div style="font-size:12px;font-weight:700;margin-bottom:3px">[${item.n.toUpperCase()}] ${item.ti}</div><div style="font-size:11px;color:#4B5563">Seção: ${item.s}`;
        if(n.causa) eHtml+=` · Causa: <b>${n.causa}</b>`;
        if(n.resp)  eHtml+=` · Responsável: <b>${n.resp}</b>`;
        if(n.resolvido) eHtml+=` · Resolvido: ${n.resolvido}`;
        if(n.prox) eHtml+=` · Próx.turno: ${n.prox}`;
        if(n.just) eHtml+=`<br>${n.just}`;
        eHtml+='</div></div>';
      });
      eHtml+='</div>';
    } else {
      eHtml+=`<div style="padding:16px 20px;background:#F0FDF4;text-align:center;color:#16A34A;font-weight:600">✅ Nenhuma falha neste turno</div>`;
    }
    if(ff.obsGerais) eHtml+=`<div style="padding:14px 20px;border-top:1px solid #E5E7EB;font-size:12px;color:#374151"><b>📝 Ocorrências do turno:</b><br>${ff.obsGerais}</div>`;
    eHtml+=`<div style="background:#1A1A1A;padding:10px 20px;display:flex;justify-content:space-between"><span style="font-size:10px;color:#666">${user.name} · ${hora}</span><span style="font-size:9px;color:#444">Koncluí · Pastel da Camila</span></div></div>`;

    const emailPayload={
      assunto:`[Koncluí] ${status} – ${user.name} · ${tLbl} · ${ident.data}`,
      html:eHtml,
    };
    const ok=await sendWebhook(textoFinal,emailPayload);
    setWebhookOk(ok);
    await new Promise(r=>setTimeout(r,400));
    setSendSteps(s=>{const c=[...s];c[2]={...c[2],st:ok?'ok':'ok'};c[3]={...c[3],st:'go'};return c;});
    await new Promise(r=>setTimeout(r,500));
    setSendSteps(s=>{const c=[...s];c[3]={...c[3],st:'ok'};return c;});
    await new Promise(r=>setTimeout(r,400));
    setSending(false);
    localStorage.removeItem(CK_USER_KEY);
    setScreen('summary');
  }

  function handleLimpar(){
    if(!window.confirm('Limpar checklist atual?'))return;
    localStorage.removeItem(CK_USER_KEY);
    setIdent(null);setResps({});setNegs({});
    setFF({obsGerais:'',pendProx:'',manut:'',manutDet:'',compra:'',compraDet:'',disc:'',discDet:'',tec:'',tecDet:''});
    setDecl({checked:false,nome:user.name,hora:''});setShowErr(false);setValErrs([]);setScreen('entry');
  }

  const tLabel=ident?.turno==='manha'?'🌅 Manhã':'🌙 Tarde/Noite';

  // ENTRY
  const DAYS_PT=['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
  const todayDow=new Date().getDay();
  const ctxReady=ctx.delivery!==''&&ctx.novato!==''&&ctx.falta!==''&&ctx.troco!=='';

  if(screen==='entry')return(
    <div>
      <div className="hdr"><div className="hdr-inner"><div><div className="hdr-brand">Pastel da Camila · Koncluí</div><div className="hdr-title">Checklist</div></div><div className="hdr-right"><div className="hdr-chip">👤 {user.name}</div>{onBack&&<button className="hdr-btn" onClick={onBack}>← Hub</button>}<button className="hdr-btn" onClick={onLogout}>Sair</button></div></div></div>

      <div className="day-badge">
        <div className="day-dot"/>
        {DAYS_PT[todayDow]}, {todayFmt()}
      </div>

      <div className="card">
        <div className="card-title">🕐 Turno</div>
        <div className="turno-grid">
          <button className={`turno-btn${ident?.turno==='manha'?' active':''}`} onClick={()=>setIdent({nome:user.name,turno:'manha',data:todayFmt(),horaInicio:nowTime()})}>
            <span className="turno-icon">🌅</span>
            <div className="turno-label">Manhã</div>
          </button>
          <button className={`turno-btn${ident?.turno==='tarde'?' active':''}`} onClick={()=>setIdent({nome:user.name,turno:'tarde',data:todayFmt(),horaInicio:nowTime()})}>
            <span className="turno-icon">🌙</span>
            <div className="turno-label">Tarde / Noite</div>
          </button>
        </div>
      </div>

      {ident&&(
        <div className="card">
          <div className="card-title">
            <div>
              <div className="t-heavy">⚙️ Configuração do turno</div>
              <div className="t-xs t-muted">Responda para personalizar seu checklist</div>
            </div>
          </div>
          <div className="ctx-body">
            {/* GRUPO 1 — Obrigatórias */}
            <div style={{fontSize:9,fontWeight:700,color:'#aaa',textTransform:'uppercase',letterSpacing:.5,padding:'4px 0 6px',borderBottom:'1px solid #F0F0F0',marginBottom:4}}>Configuração obrigatória</div>
            {[
              {key:'delivery', q:'Delivery ativo hoje?',       hint:'Não → seção delivery some'},
              {key:'troco',    q:'R$300 de troco no caixa?',   hint:'Não → alerta crítico'},
              {key:'novato',   q:'Tem novato no turno?',        hint:'Sim → item supervisão'},
              {key:'falta',    q:'Tem falta na equipe?',        hint:'Sim → acionar RH freelance'},
            ].map(({key,q,hint})=>(
              <div key={key} className="ctx-row">
                <div style={{flex:1}}>
                  <div className="ctx-q">{q}</div>
                  <div style={{fontSize:9,color:'#ccc',marginTop:1}}>{hint}</div>
                </div>
                <div className="ctx-toggle">
                  <button className={`ctx-btn${ctx[key]==='sim'?' yes':''}`} onClick={()=>setCtx(c=>({...c,[key]:'sim'}))}>Sim</button>
                  <button className={`ctx-btn${ctx[key]==='nao'?' no':''}`} onClick={()=>setCtx(c=>({...c,[key]:'nao'}))}>Não</button>
                </div>
              </div>
            ))}

            {/* GRUPO 2 — Situacionais (opcionais, desbloqueiam seções extras) */}
            <div style={{fontSize:9,fontWeight:700,color:'#aaa',textTransform:'uppercase',letterSpacing:.5,padding:'10px 0 6px',borderBottom:'1px solid #F0F0F0',marginBottom:4}}>Situações especiais <span style={{fontWeight:400,color:'#ccc'}}>(opcional)</span></div>
            {[
              {key:'feriado',     q:'Feriado ou data especial?',   hint:'Sim → itens de volume extra'},
              {key:'equipamento', q:'Tem equipamento com problema?',hint:'Sim → seção manutenção'},
              {key:'promocao',    q:'Tem promoção ativa hoje?',     hint:'Sim → itens de promoção'},
              {key:'chuva',       q:'Está chovendo?',               hint:'Sim → alerta delivery/presencial'},
            ].map(({key,q,hint})=>(
              <div key={key} className="ctx-row">
                <div style={{flex:1}}>
                  <div className="ctx-q">{q}</div>
                  <div style={{fontSize:9,color:'#ccc',marginTop:1}}>{hint}</div>
                </div>
                <div className="ctx-toggle">
                  <button className={`ctx-btn${ctx[key]==='sim'?' yes':''}`} onClick={()=>setCtx(c=>({...c,[key]:'sim'}))}>Sim</button>
                  <button className={`ctx-btn${ctx[key]==='nao'?' no':''}`} onClick={()=>setCtx(c=>({...c,[key]:'nao'}))}>Não</button>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {ident&&ctxReady&&(
        <div style={{padding:'0 10px',marginTop:10}}>
          <button onClick={()=>setScreen('checklist')} className="start-btn">
            Iniciar Checklist →
          </button>
          <div style={{marginTop:8,fontSize:10,color:'#aaa',textAlign:'center'}}>
            {filterItems(ITEMS,ident.turno==='manha'?'manha':'tarde',ctx).length} itens para hoje
          </div>
        </div>
      )}
    </div>
  );

  if(screen==='ocorrencias')return(
    <OcorrenciasScreen
      items={items}
      resps={resps}
      negs={negs}
      user={user}
      onNegsChange={(id,d)=>setNegs(n=>({...n,[id]:d}))}
      onConfirm={handleEnviar}
      onBack={()=>setScreen('checklist')}
    />
  );
  if(screen==='summary')return <SummaryScreen ident={ident} resps={resps} negs={negs} ff={ff} decl={decl} items={items} onBack={()=>setScreen('checklist')} webhookOk={webhookOk}/>;

  // CHECKLIST VIEW
  return(
    <div>
      {sending&&<SendingOverlay steps={sendSteps}/>}
      <Toast msg={toast.msg} show={toast.show}/>
      <div className="hdr"><div className="hdr-inner"><div><div className="hdr-brand">Pastel da Camila · Koncluí</div><div className="hdr-title">{tLabel}</div></div><div className="hdr-right"><div className="hdr-chip">👤 {user.name}</div>{onBack&&<button className="hdr-btn" onClick={onBack}>← Hub</button>}<button className="hdr-btn" onClick={onLogout}>Sair</button></div></div></div>

      <div className="status-panel">
        <div style={{display:'flex',flexDirection:'column',gap:1}}>
          <div style={{fontSize:10,color:'#aaa',fontWeight:600,textTransform:'uppercase',letterSpacing:.3}}>Status</div>
          <span className={`s-badge ${statusInfo.cls}`}>{statusInfo.txt}</span>
        </div>
        <div className="s-stats">
          <div className="sts-item"><div className="sv" style={{color:'var(--brand)'}}>{stats.fl}</div><div className="sl">Falhas</div></div>
          <div className="sts-item"><div className="sv" style={{color:'var(--warn)'}}>{stats.cr}</div><div className="sl">Críticos</div></div>
          <div className="sts-item"><div className="sv" style={{color:'#aaa'}}>{stats.pend}</div><div className="sl">Pendentes</div></div>
        </div>
      </div>

      <div className="prog-card">
        <div className="prog-top">
          <div className="prog-lbl">Progresso</div>
          <div className="prog-pct">{stats.pct}%</div>
        </div>
        <div className="prog-track"><div className="prog-fill" style={{width:`${stats.pct}%`}}/></div>
        <div className="prog-stats">
          <div><div className="pv" style={{color:'var(--ok)'}}>{stats.resp}</div><div className="pl">Resp.</div></div>
          <div><div className="pv" style={{color:'var(--ink3)'}}>{stats.pend}</div><div className="pl">Pend.</div></div>
          <div><div className="pv" style={{color:'var(--brand)'}}>{stats.fl}</div><div className="pl">Falhas</div></div>
          <div><div className="pv" style={{color:'var(--warn)'}}>{stats.cr}</div><div className="pl">Críticos</div></div>
        </div>
        <div style={{marginTop:8,fontSize:11,color:'var(--ink2)',textAlign:'center',fontWeight:600}}>
          {stats.pct===0?'Vamos começar!':stats.pct<50?'Continue com atenção.':stats.pct<90?'⚠️ Finalize os itens restantes.':stats.pct<100?'🔥 Quase lá!':'✅ Todos respondidos. Revise e envie.'}
        </div>
      </div>

      {showErr&&valErrs.length>0&&(
        <div className="val-wrap">
          <div className="val-title">🚫 Corrija antes de enviar ({valErrs.length})</div>
          {valErrs.slice(0,7).map((e,i)=><div key={i} className="val-item">{e}</div>)}
          {valErrs.length>7&&<div style={{fontSize:11,color:'var(--brand)',fontWeight:600,marginTop:5}}>...e mais {valErrs.length-7} erros.</div>}
        </div>
      )}

      {(()=>{const cfg=getConfig();return secs.map(s=>{
        const its=items.filter(i=>i.s===s);
        if(its.length===0) return null;
        const hints=[];
        if(s==='Delivery'&&ctx.delivery==='sim') hints.push({c:'var(--blue)',t:'Delivery ativo hoje'});
        if(s==='Equipe'&&ctx.novato==='sim') hints.push({c:'var(--orange)',t:'Novato no turno — supervisão obrigatória'});
        if(s==='Equipe'&&ctx.falta==='sim') hints.push({c:'var(--brand)',t:'Falta confirmada — acionar Viviane (RH) freelance'});
        if(s==='Caixa'&&ctx.troco==='sim') hints.push({c:'var(--ok)',t:'Troco ok — R$300 confirmado'});
        if(s==='Caixa'&&ctx.troco==='nao') hints.push({c:'var(--brand)',t:'Troco insuficiente — resolver antes de abrir'});
        
        
        if(s==='Dia Especial') hints.push({c:'#6B3FA0',t:'Feriado / Data especial — volume acima do normal'});
        if(s==='Manutenção') hints.push({c:'var(--orange)',t:'Equipamento com problema — resolver urgente'});
        if(s==='Promoção') hints.push({c:'var(--blue)',t:'Promoção ativa — equipe alerta'});
        if(s==='Clima') hints.push({c:'var(--blue)',t:'Chuva — delivery pode cair, foco no presencial'});
        const dow2=new Date().getDay();
        if((s==='Massa'||s==='Abastecimento')&&(dow2===5||dow2===6)) hints.push({c:'#6B3FA0',t:'Final de semana — produção e estoque reforçados'});
        return(
          <div key={s}>
            {hints.map((h,i)=>(
              <div key={i} style={{margin:'6px 10px 0',padding:'6px 11px',borderRadius:'var(--rs)',background:`${h.c}18`,border:`1px solid ${h.c}44`,fontSize:10,fontWeight:600,color:h.c,display:'flex',alignItems:'center',gap:5}}>
                <span>⚡</span>{h.t}
              </div>
            ))}
            <SecAcc secao={s} emoji={its[0]?.e||'📋'} items={its} resps={resps} negs={negs} onAns={onAns} onNeg={onNeg} showErr={showErr}/>
          </div>
        );
      });})()}

      <div style={{margin:'10px 16px 0',background:'#fff',borderRadius:12,border:'1px solid #E5E7EB',padding:'13px'}}>
        <div style={{fontFamily:"'Sora',sans-serif",fontSize:12,fontWeight:700,marginBottom:10,display:'flex',alignItems:'center',gap:6}}>📝 Ocorrências do turno</div>
        <textarea value={ff.obsGerais||''} onChange={e=>setF('obsGerais',e.target.value)}
          placeholder="Descreva o que aconteceu de relevante neste turno... (opcional)"
          style={{width:'100%',border:'1.5px solid #E5E7EB',borderRadius:8,padding:'9px 11px',fontSize:13,color:'#111',background:'#FAFAFA',resize:'none',minHeight:72,lineHeight:1.5,fontFamily:'inherit'}}/>
      </div>
      
      {screen==='checklist'&&<div className="fab">
        <div className="fab-inner">
        <button className="fab-save" onClick={()=>showToast('✅ Rascunho salvo!')}>💾 Salvar</button>
        <button className="fab-send" onClick={()=>{
          const errs=items.filter(i=>!resps[i.id]);
          if(errs.length>0){setShowErr(true);window.scrollTo({top:0,behavior:'smooth'});showToast('⚠ Responda todos os itens primeiro');return;}
          setScreen('ocorrencias');
        }} disabled={sending}>🚀 Finalizar Turno</button>
        <button className="fab-del" onClick={handleLimpar}>🗑</button>
        </div>
      </div>}
    </div>
  );
}

function SummaryScreen({ident,resps,negs,ff,decl,items,onBack,webhookOk}){
  const total=items.length;
  const falhas=items.filter(i=>resps[i.id]==='nao').length;
  const criticos=items.filter(i=>i.n==='critico'&&resps[i.id]==='nao').length;
  const score=Math.max(0,Math.round(100-(falhas/total*40)-(criticos*10)));
  const turnoLabel=ident.turno==='manha'?'🌅 Manhã':'🌙 Tarde/Noite';
  const falhasItems=items.filter(i=>resps[i.id]==='nao');
  const nome=decl.nome||ident.nome||'Subgerente';
  const hora=decl.hora||'--:--';

  const feedback=
    score===100?{emoji:'🏆',titulo:'Perfeito! Zero falhas.',sub:'Você garantiu que a Camila funciona no nível mais alto hoje.',cor:'#16A34A',bg:'#F0FDF4',border:'#BBF7D0'}:
    score>=90? {emoji:'🔥',titulo:'Mandou muito bem!',sub:'Quase zero falhas. O turno ficou em ótimas mãos.',cor:'#16A34A',bg:'#F0FDF4',border:'#BBF7D0'}:
    score>=75? {emoji:'💪',titulo:'Bom turno!',sub:`${falhas} item${falhas>1?'s':''} ficou pra trás, mas o essencial foi feito.`,cor:'#D97706',bg:'#FFFBEB',border:'#FDE68A'}:
    score>=60? {emoji:'🛠',titulo:'Dá pra melhorar.',sub:'Alguns pontos críticos em aberto. Próximo turno precisa de atenção.',cor:'#EA580C',bg:'#FFF7ED',border:'#FED7AA'}:
               {emoji:'⚠️',titulo:'Turno com problemas.',sub:'Vários itens críticos em aberto. Gestão precisa saber.',cor:'#DC2626',bg:'#FEF2F2',border:'#FECACA'};

  function buildText(){
    const sep='━━━━━━━━━━━━━━━━━━';
    const lines=['🥟 *PASTEL DA CAMILA — KONCLUÍ*',sep,
      `${feedback.emoji} Score: *${score}/100*`,
      `👤 ${nome} · ${turnoLabel} · ${ident.data}`,
      `⏰ ${ident.horaInicio} → ${hora}`,sep,
      `✅ Feitos: ${items.filter(i=>resps[i.id]==='sim').length}/${total}`,
      `❌ Não feitos: ${falhas}`,
    ];
    if(falhasItems.length>0){
      lines.push('',sep,'🔴 *O QUE NÃO FOI FEITO*');
      falhasItems.forEach((item,i)=>{
        const n=negs[item.id]||{};
        lines.push(`${i+1}. [${item.n}] ${item.ti}`);
        if(n.just) lines.push(`   → ${n.just}`);
      });
    }
    if(ff.obsGerais) lines.push(sep,`📝 ${ff.obsGerais}`);
    lines.push(sep,`_Koncluí · Pastel da Camila_`);
    return lines.join('\n');
  }

  function handleCopy(){
    const txt=buildText();
    navigator.clipboard?.writeText(txt).catch(()=>{
      const ta=document.createElement('textarea');ta.value=txt;
      document.body.appendChild(ta);ta.select();document.execCommand('copy');
      document.body.removeChild(ta);
    });
  }

  function handleWhatsApp(){
    window.open('https://wa.me/5511940366586?text='+encodeURIComponent(buildText()),'_blank');
  }

  return(
    <div style={{minHeight:'100vh',background:'#F4F4F6',paddingBottom:32}}>
      <div style={{background:'linear-gradient(135deg,#1A0005,#EA1D2C)',color:'#fff',padding:'14px 16px'}}>
        <div style={{fontSize:11,fontWeight:700,opacity:.6,textTransform:'uppercase',letterSpacing:1.5,marginBottom:4}}>Koncluí · Pastel da Camila</div>
        <div style={{fontFamily:"'Sora',sans-serif",fontSize:18,fontWeight:900}}>Turno finalizado ✓</div>
        <div style={{fontSize:12,opacity:.7,marginTop:2}}>{nome} · {turnoLabel} · {ident.data}</div>
        {webhookOk&&<div style={{display:'inline-block',background:'rgba(255,255,255,.15)',borderRadius:99,padding:'3px 10px',fontSize:10,fontWeight:700,marginTop:6}}>✓ Relatório enviado por e-mail</div>}
      </div>
      <div style={{maxWidth:720,margin:'0 auto',padding:'14px 16px 0'}}>
        <div style={{background:feedback.bg,border:`1.5px solid ${feedback.border}`,borderRadius:16,padding:'18px 16px',marginBottom:12,display:'flex',alignItems:'center',gap:14}}>
          <div style={{fontSize:44,flexShrink:0,lineHeight:1}}>{feedback.emoji}</div>
          <div style={{flex:1}}>
            <div style={{fontFamily:"'Sora',sans-serif",fontSize:17,fontWeight:900,color:feedback.cor,marginBottom:3}}>{feedback.titulo}</div>
            <div style={{fontSize:12,color:feedback.cor,opacity:.85,lineHeight:1.5}}>{feedback.sub}</div>
          </div>
          <div style={{textAlign:'center',flexShrink:0}}>
            <div style={{fontFamily:"'Sora',sans-serif",fontSize:32,fontWeight:900,color:feedback.cor,lineHeight:1}}>{score}</div>
            <div style={{fontSize:9,color:feedback.cor,opacity:.7,fontWeight:700}}>/ 100</div>
          </div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:12}}>
          {[
            {icon:'✅',val:items.filter(i=>resps[i.id]==='sim').length,lbl:'Feitos'},
            {icon:'❌',val:falhas,lbl:'Falhas'},
            {icon:'🔴',val:criticos,lbl:'Críticos'},
          ].map(({icon,val,lbl})=>(
            <div key={lbl} style={{background:'#fff',borderRadius:12,padding:'12px 8px',textAlign:'center',border:'1px solid #E5E7EB'}}>
              <div style={{fontSize:18}}>{icon}</div>
              <div style={{fontFamily:"'Sora',sans-serif",fontSize:22,fontWeight:900,color:'#111',lineHeight:1}}>{val}</div>
              <div style={{fontSize:10,color:'#9CA3AF',fontWeight:600,marginTop:2}}>{lbl}</div>
            </div>
          ))}
        </div>
        {falhasItems.length>0&&(
          <div style={{background:'#fff',borderRadius:12,border:'1px solid #FECACA',padding:'14px 16px',marginBottom:12}}>
            <div style={{fontSize:11,fontWeight:700,color:'#DC2626',textTransform:'uppercase',letterSpacing:.5,marginBottom:10}}>O que ficou pendente</div>
            {falhasItems.map((item,i)=>{
              const n=negs[item.id]||{};
              return(
                <div key={item.id} style={{display:'flex',gap:10,padding:'7px 0',borderBottom:i<falhasItems.length-1?'1px solid #FEF2F2':'none',alignItems:'flex-start'}}>
                  <span style={{fontSize:14,flexShrink:0,marginTop:1}}>{item.n==='critico'?'🔴':'🟡'}</span>
                  <div>
                    <div style={{fontSize:13,fontWeight:600,color:'#111'}}>{item.ti}</div>
                    {n.just&&<div style={{fontSize:11,color:'#6B7280',marginTop:2}}>→ {n.just}</div>}
                  </div>
                </div>
              );
            })}
          </div>
        )}
        <div style={{background:'#fff',borderRadius:12,border:'1px solid #E5E7EB',padding:'12px 14px',marginBottom:12}}>
          <div style={{fontSize:11,fontWeight:700,color:'#9CA3AF',textTransform:'uppercase',letterSpacing:.5,marginBottom:4}}>Por que esse checklist existe</div>
          <div style={{fontSize:13,color:'#374151',lineHeight:1.6}}>Cada item que você marca garante que o próximo turno começa bem — e que a Camila pode confiar na operação sem precisar estar presente. <b>Você é a operação.</b></div>
        </div>
        <div style={{display:'flex',gap:8,marginBottom:8}}>
          <button onClick={handleWhatsApp} style={{flex:2,padding:13,background:'#25D366',color:'#fff',borderRadius:12,fontFamily:"'Sora',sans-serif",fontSize:13,fontWeight:700,cursor:'pointer',border:'none',display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
            📲 Enviar no WhatsApp
          </button>
          <button onClick={handleCopy} style={{flex:1,padding:13,background:'#F3F4F6',color:'#374151',borderRadius:12,fontFamily:"'Sora',sans-serif",fontSize:13,fontWeight:700,cursor:'pointer',border:'1px solid #E5E7EB'}}>
            📋 Copiar
          </button>
        </div>
        <button onClick={onBack} style={{width:'100%',padding:11,background:'transparent',color:'#9CA3AF',borderRadius:12,fontSize:12,fontWeight:600,cursor:'pointer',border:'1px solid #E5E7EB'}}>
          ← Novo turno
        </button>
      </div>
    </div>
  );
}


function CEODashboard({user,onLogout,onBack}){
  const [tab,setTab]=useState('overview');
  const realData=useMemo(()=>{try{return JSON.parse(localStorage.getItem(CK_KEY)||'[]');}catch{return[];}});
  const merged=useMemo(()=>realData,[realData]);

  const kpi=useMemo(()=>{
    const r=merged,tot=r.length;
    const avg=Math.round(r.reduce((a,b)=>a+b.score,0)/Math.max(tot,1));
    const fl=r.reduce((a,b)=>a+b.falhas,0),cr=r.reduce((a,b)=>a+b.criticos,0),pend=r.reduce((a,b)=>a+(b.pendencias||0),0);
    const conf=r.filter(d=>d.status==='conforme').length;
    return{tot,avg,fl,cr,pend,conf,taxa:Math.round(conf/Math.max(tot,1)*100)};
  },[merged]);

  const scoreByDay=useMemo(()=>DAYS.map((day,di)=>{
    const d=merged.filter(x=>x.dayIdx===di||x.day===day);
    return{day,score:d.length?Math.round(d.reduce((a,b)=>a+b.score,0)/d.length):0,falhas:d.reduce((a,b)=>a+b.falhas,0)};
  }),[merged]);

  const ranking=useMemo(()=>{
    const names=[...new Set(merged.map(d=>d.user||d.name))];
    return names.map(name=>{
      const d=merged.filter(x=>(x.user||x.name)===name);
      return{name,avg:Math.round(d.reduce((a,b)=>a+b.score,0)/Math.max(d.length,1)),turnos:d.length,falhas:d.reduce((a,b)=>a+b.falhas,0)};
    }).sort((a,b)=>b.avg-a.avg);
  },[merged]);

  const alertas=useMemo(()=>{
    const a=[];
    merged.filter(d=>d.criticos>0).slice(0,5).forEach(d=>a.push({tipo:'critico',msg:`${d.user||d.name} · ${d.turno==='manha'?'Manhã':'Tarde'} · ${d.dataFmt||d.day}`,sub:`${d.criticos} crítico(s) sem tratamento · Score ${d.score}`}));
    merged.filter(d=>d.pendencias>0).slice(0,3).forEach(d=>a.push({tipo:'pend',msg:`Pendência aberta — ${d.user||d.name}`,sub:`${d.pendencias} item(s) p/ próximo turno · Score ${d.score}`}));
    return a.slice(0,8);
  },[merged]);

  const aColors=['#E8001C','#7C3AED','#2563EB','#F97316'];

  return(
    <div>
      <div className="ceo-hdr">
        <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between'}}>
          <div>
            <div style={{fontSize:10,opacity:.6,fontWeight:700,letterSpacing:1.5,textTransform:'uppercase',marginBottom:3}}>🥟 Pastel da Camila</div>
            <div className="ceo-title">Visão CEO</div>
            <div className="ceo-sub">Gestão Operacional de Franquias · Koncluí</div>
            <div className="ceo-badge">👑 {user.name} · Acesso Total</div>
          </div>
          <button className="hdr-btn" style={{background:'rgba(255,255,255,.12)',border:'1.5px solid rgba(255,255,255,.25)',color:'#fff',borderRadius:99,padding:'6px 12px',fontSize:10,fontWeight:700}} onClick={onLogout}>Sair</button>
          {onBack&&<button style={{background:'rgba(255,255,255,.12)',border:'1.5px solid rgba(255,255,255,.25)',color:'#fff',borderRadius:99,padding:'6px 12px',fontSize:10,fontWeight:700,marginLeft:4}} onClick={onBack}>← Hub</button>}
        </div>
        <div style={{marginTop:10,fontSize:10,opacity:.55}}>{todayFmt()} · {realData.length>0?`${realData.length} turnos reais registrados`:'Modo demo — aguardando checklists'}</div>
      </div>

      <div className="ceo-nav">
        {[['overview','📊 Geral'],['ranking','🏆 Ranking'],['alertas','🚨 Alertas'],['turnos','📋 Turnos'],['tendencia','📈 Tendência']].map(([k,l])=>(
          <button key={k} className={`nav-tab${tab===k?' active':''}`} onClick={()=>setTab(k)}>{l}</button>
        ))}
      </div>

      {tab==='overview'&&(<>
        <div className="kpi-grid">
          <div className="kpi-card kc-r"><div className="kpi-ico">📊</div><div className="kpi-lbl">Score Médio</div><div className="kpi-val">{kpi.avg}</div><div className="kpi-sub">de 100 possíveis</div><span className={`trend ${kpi.avg>=80?'tu':kpi.avg>=60?'tf':'td'}`}>{kpi.avg>=80?'▲ Ótimo':kpi.avg>=60?'→ Regular':'▼ Atenção'}</span></div>
          <div className="kpi-card kc-g"><div className="kpi-ico">✅</div><div className="kpi-lbl">Conformidade</div><div className="kpi-val">{kpi.taxa}%</div><div className="kpi-sub">{kpi.conf}/{kpi.tot} turnos ok</div><span className={`trend ${kpi.taxa>=80?'tu':'td'}`}>{kpi.taxa>=80?'▲ Boa':'▼ Atenção'}</span></div>
          <div className="kpi-card kc-r"><div className="kpi-ico">❌</div><div className="kpi-lbl">Total Falhas</div><div className="kpi-val">{kpi.fl}</div><div className="kpi-sub">em {kpi.tot} turnos</div></div>
          <div className="kpi-card kc-o"><div className="kpi-ico">🔴</div><div className="kpi-lbl">Críticos</div><div className="kpi-val">{kpi.cr}</div><div className="kpi-sub">sem tratamento</div></div>

          <div className="chart-t">🎯 Status dos Turnos</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,textAlign:'center'}}>
            {[['Conforme',merged.filter(d=>d.status==='conforme').length,'var(--ok)'],['Ressalvas',merged.filter(d=>d.status==='ressalvas'||d.status==='com_ressalvas').length,'var(--yellow)'],['Crítico',merged.filter(d=>d.status==='critico').length,'var(--brand)']].map(([l,v,c])=>(

                <div style={{fontFamily:"'Sora',sans-serif",fontSize:22,fontWeight:900,color:c}}>{v}</div>

          </div>
          <div style={{overflowX:'auto'}}>
            <div className="hm-grid">
              <div/>
              {DAYS.map(d=><div key={d} style={{fontSize:8,fontWeight:700,color:'var(--ink3)',textAlign:'center'}}>{d}</div>)}
              {['Manhã','Tarde'].map(turno=>(
                <React.Fragment key={turno}>
                  <div style={{fontSize:8,fontWeight:700,color:'var(--ink3)',display:'flex',alignItems:'center',paddingRight:3,whiteSpace:'nowrap'}}>{turno}</div>

                    const t=turno==='Manhã'?'manha':'tarde';
                    const d=merged.find(x=>(x.dayIdx===di||x.day===day)&&x.turno===t);

      {tab==='ranking'&&(
        <div className="chart-card" style={{margin:'12px 12px 0'}}>
          <div className="chart-t">🏆 Ranking de Subgerentes</div>
          {ranking.map((u,i)=>(
            <div key={u.name} className="rank-row">
              <div className="rank-pos" style={{color:i===0?'#F59E0B':i===1?'#9CA3AF':'#B45309'}}>{i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</div>
              <div className="rank-avatar" style={{background:aColors[i%aColors.length]}}>{u.name.charAt(0)}</div>
              <div style={{flex:1}}>
                <div className="rank-name">{u.name}</div>
                <div className="rank-sub">{u.turnos} turnos · {u.falhas} falhas</div>

                  <div style={{height:'100%',borderRadius:99,background:u.avg>=80?'var(--ok)':u.avg>=60?'var(--yellow)':'var(--brand)',width:`${u.avg}%`,transition:'width .5s'}}/>

              </div>
              <div className="rank-score" style={{color:u.avg>=80?'var(--ok)':u.avg>=60?'var(--yellow)':'var(--brand)'}}>{u.avg}</div>

          ))}
        </div>

          <div className="chart-t">🚨 Alertas Operacionais</div>

            <div key={i} className="alert-row">

              <div className="a-badge" style={{background:a.tipo==='critico'?'#FEE2E2':'#FED7AA',color:a.tipo==='critico'?'#991B1B':'#9A3412'}}>{a.tipo==='critico'?'🔴 Crítico':'⏳ Pendência'}</div>

                  const sc=d.score,c=sc>=80?'var(--ok)':sc>=60?'var(--yellow)':'var(--brand)';

                  return(
                    <tr key={i} style={{opacity:d.isDemo?.75:1}}>

            {scoreByDay.map((d,i)=>{
              const h=d.score>0?Math.max((d.score/100)*90,4):2;

              return <div key={i} className="bar-col"><div className="bar-val" style={{fontSize:9}}>{d.score||'–'}</div><div style={{flex:1,display:'flex',alignItems:'flex-end',width:'100%',position:'relative'}}><div style={{position:'absolute',bottom:'80%',left:0,right:0,borderTop:'1px dashed #ddd'}}/><div className="bar-fill" style={{height:`${h}%`,background:c}}/></div><div className="bar-lbl">{d.day}</div></div>;

          <div style={{marginTop:6,fontSize:10,color:'var(--ink3)',textAlign:'center'}}>Linha tracejada = meta 80 pts</div>
        </div>
        <div className="chart-card">
          <div className="chart-t">📉 Falhas por Dia</div>
          <div className="bar-chart" style={{height:100}}>
            {scoreByDay.map((d,i)=>{
              const mx=Math.max(...scoreByDay.map(x=>x.falhas),1);
              const h=d.falhas>0?Math.max((d.falhas/mx)*90,4):2;
              return <div key={i} className="bar-col"><div className="bar-val" style={{fontSize:9,color:'var(--brand)'}}>{d.falhas||0}</div><div style={{flex:1,display:'flex',alignItems:'flex-end',width:'100%'}}><div className="bar-fill" style={{height:`${h}%`,background:d.falhas>0?'var(--brand)':'#E5E5E5'}}/></div><div className="bar-lbl">{d.day}</div></div>;
            })}
          </div>
        </div>
        <div className="chart-card">
          <div className="chart-t">🎯 Métricas de Qualidade</div>
          {[['Conformidade',`${kpi.taxa}%`,kpi.taxa,'var(--ok)'],['Score Médio',`${kpi.avg}/100`,kpi.avg,'var(--blue)'],['Falhas/Turno',`${(kpi.fl/Math.max(kpi.tot,1)).toFixed(1)}`,Math.max(0,100-kpi.fl/Math.max(kpi.tot,1)*15),'var(--orange)']].map(([l,v,p,c])=>(
            <div key={l} style={{marginBottom:12}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}><div style={{fontSize:12,fontWeight:600}}>{l}</div><div style={{fontFamily:"'Sora',sans-serif",fontSize:13,fontWeight:800,color:c}}>{v}</div></div>
              <div style={{background:'#F0F0F0',borderRadius:99,height:7,overflow:'hidden'}}><div style={{height:'100%',borderRadius:99,background:c,width:`${Math.min(p,100)}%`,transition:'width .5s'}}/></div>
            </div>
          ))}
        </div>
        <div className="chart-card">
          <div style={{fontFamily:"'Sora',sans-serif",fontSize:12,fontWeight:700,marginBottom:11}}>🔮 Roadmap Koncluí</div>
          {[['✅','Checklist digital com travas anti-maquiagem','Entregue'],['✅','Login por usuário com roles (CEO / Subgerente)','Entregue'],['✅','Painel CEO com KPIs e gráficos operacionais','Entregue'],['✅','Webhook Make + envio automático por email','Entregue'],['✅','Geração de imagem para grupo WhatsApp','Entregue'],['🔄','Banco de dados (Supabase) – dados persistentes','Próximo'],['🔄','Notificações automáticas WhatsApp via Evolution API','Próximo'],['🔄','Multi-unidade (gestão de rede de franquias)','Futuro'],['🔄','App nativo iOS/Android','Futuro'],['🔄','IA para detecção de padrões de falha','Futuro']].map(([icon,label,status],i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',gap:9,padding:'7px 0',borderBottom:'1px solid var(--border)'}}>
              <span style={{fontSize:14}}>{icon}</span>
              <div style={{flex:1,fontSize:12}}>{label}</div>
              <span style={{fontSize:9,fontWeight:700,padding:'2px 7px',borderRadius:99,background:status==='Entregue'?'#D1FAE5':status==='Próximo'?'#FEF3C7':'#F3F4F6',color:status==='Entregue'?'#065F46':status==='Próximo'?'#92400E':'var(--text3)'}}>{status}</span>
            </div>
          ))}
        </div>
      </>)}
      <div style={{height:20}}/>
    </div>
  );
}

function UserManager({user,onBack,onLogout}){
  const [users,setUsers]=useState(()=>getUsers());
  const [editKey,setEditKey]=useState(null);
  const [showNew,setShowNew]=useState(false);
  const [toast,setToast]=useState('');
  const [newUser,setNewUser]=useState({name:'',login:'',role:'subgerente',pwd:'158a323a7ba44870f23d96f1516dd70aa48e9a72db4ebb026b0a89e212a208ab'});
  const toastRef=React.useRef();

  const ROLES={subgerente:'Subgerente',gerente:'Gerente',suporte:'Suporte',ceo:'CEO'};
  const ROLE_COLORS={subgerente:'var(--brand)',gerente:'var(--ok)',suporte:'var(--blue)',ceo:'#1A1A1A'};

  function showMsg(msg){setToast(msg);clearTimeout(toastRef.current);toastRef.current=setTimeout(()=>setToast(''),2500);}

  function saveAndRefresh(updated){
    saveUsers(updated);
    setUsers({...updated});
    showMsg('✅ Salvo com sucesso!');
  }

  function toggleActive(key){
    const u={...users};
    u[key]={...u[key],active:u[key].active===false?true:false};
    saveAndRefresh(u);
  }

  function resetPwd(key){
    if(!window.confirm('Resetar senha deste usuário para 2026?')) return;
    const u={...users};
    u[key]={...u[key],pwd:'158a323a7ba44870f23d96f1516dd70aa48e9a72db4ebb026b0a89e212a208ab',first:false};
    saveAndRefresh(u);
    showMsg('🔑 Senha resetada para 2026.');
  }

  function saveEdit(key,fields){
    const u={...users};
    u[key]={...u[key],...fields};
    saveAndRefresh(u);
    setEditKey(null);
  }

  function deleteUser(key){
    if(!window.confirm('Tem certeza que deseja remover este usuário?')) return;
    const u={...users};
    delete u[key];
    saveAndRefresh(u);
    showMsg('🗑️ Usuário removido.');
  }

  function createUser(){
    if(!newUser.name.trim()||!newUser.login.trim()){showMsg('❌ Nome e login obrigatórios.');return;}
    const key=newUser.login.trim().toLowerCase().replace(/\s/g,'');
    if(users[key]){showMsg('❌ Login já existe.');return;}
    const u={...users};
    u[key]={name:newUser.name.trim(),login:key,role:newUser.role,pwd:newUser.pwd||'2026',first:false,color:ROLE_COLORS[newUser.role]||'#555',active:true};
    saveAndRefresh(u);
    setNewUser({name:'',login:'',role:'subgerente',pwd:'158a323a7ba44870f23d96f1516dd70aa48e9a72db4ebb026b0a89e212a208ab'});
    setShowNew(false);
    showMsg('✅ Usuário criado! Senha: '+(newUser.pwd||'2026'));
  }

  const userList=Object.entries(users);

  return(
    <div style={{minHeight:'100vh',background:'var(--bg)',paddingBottom:80}}>
      {/* header */}
      <div className="um-hdr">
        <div className="um-hdr-inner">
          <div>
            <div style={{fontSize:10,opacity:.7,fontWeight:700,letterSpacing:2,textTransform:'uppercase'}}>Koncluí · Suporte</div>
            <div style={{fontFamily:"'Sora',sans-serif",fontSize:17,fontWeight:800}}>👥 Gestão de Usuários</div>
          </div>
          <div style={{display:'flex',gap:6}}>
            <button onClick={onBack} className="hdr-btn">← Hub</button>
            <button onClick={onLogout} className="hdr-btn">Sair</button>
          </div>
        </div>
      </div>

      {toast&&<div style={{position:'fixed',top:70,left:'50%',transform:'translateX(-50%)',background:'#1A1A1A',color:'#fff',padding:'9px 20px',borderRadius:99,fontSize:13,fontWeight:600,zIndex:9999,whiteSpace:'nowrap',boxShadow:'0 8px 24px rgba(0,0,0,.3)'}}>{toast}</div>}

      

      {/* stats */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,padding:'14px 14px 0'}}>
        {[['Total',userList.length,'var(--blue)'],['Ativos',userList.filter(([,u])=>u.active!==false).length,'var(--ok)'],['Inativos',userList.filter(([,u])=>u.active===false).length,'var(--text3)']].map(([l,v,c])=>(
          <div key={l} style={{background:'#fff',borderRadius:'var(--r)',padding:'12px 8px',textAlign:'center',boxShadow:'var(--sh)'}}>
            <div style={{fontFamily:"'Sora',sans-serif",fontSize:22,fontWeight:900,color:c}}>{v}</div>
            <div style={{fontSize:10,color:'var(--ink3)',fontWeight:700,textTransform:'uppercase',marginTop:2}}>{l}</div>
          </div>
        ))}
      </div>

      {/* user list */}
      <div style={{margin:'14px 14px 0',background:'#fff',borderRadius:'var(--r)',boxShadow:'var(--sh)',overflow:'hidden'}}>
        <div style={{padding:'14px 16px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{fontFamily:"'Sora',sans-serif",fontSize:14,fontWeight:700}}>Usuários do Sistema</div>
          <button onClick={()=>setShowNew(s=>!s)} style={{background:'var(--blue)',color:'#fff',borderRadius:'var(--rs)',padding:'7px 14px',fontFamily:"'Sora',sans-serif",fontSize:12,fontWeight:700}}>
            {showNew?'✕ Cancelar':'+ Novo Usuário'}
          </button>
        </div>

        {/* new user form */}
        {showNew&&(
          <div style={{padding:'16px',background:'#F0F4FF',borderBottom:'1px solid var(--border)'}}>
            <div style={{fontFamily:"'Sora',sans-serif",fontSize:12,fontWeight:800,color:'var(--blue)',marginBottom:12,textTransform:'uppercase',letterSpacing:.5}}>+ Criar Novo Usuário</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
              <div className="f-group"><label className="f-label">Nome *</label><input className="f-input" value={newUser.name} onChange={e=>setNewUser(n=>({...n,name:e.target.value}))} placeholder="Nome completo"/></div>
              <div className="f-group"><label className="f-label">Login *</label><input className="f-input" value={newUser.login} onChange={e=>setNewUser(n=>({...n,login:e.target.value.toLowerCase()}))} placeholder="login (sem espaço)"/></div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
              <div className="f-group"><label className="f-label">Role</label>
                <select className="f-input" value={newUser.role} onChange={e=>setNewUser(n=>({...n,role:e.target.value}))}>
                  {Object.entries(ROLES).map(([k,v])=><option key={k} value={k}>{v}</option>)}
                </select>
              </div>
              <div className="f-group"><label className="f-label">Senha inicial</label><input className="f-input" value={newUser.pwd} onChange={e=>setNewUser(n=>({...n,pwd:e.target.value}))} placeholder="2026"/></div>
            </div>
            <button onClick={createUser} style={{width:'100%',padding:'12px',background:'var(--blue)',color:'#fff',borderRadius:'var(--rs)',fontFamily:"'Sora',sans-serif",fontSize:13,fontWeight:800}}>
              CRIAR USUÁRIO
            </button>
          </div>
        )}

        {/* list */}
        {userList.map(([key,u])=>{
          const isEdit=editKey===key;
          const inactive=u.active===false;
          return(
            <div key={key} style={{padding:'14px 16px',borderBottom:'1px solid var(--border)',opacity:inactive?.5:1}}>
              {!isEdit?(
                <div>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:6}}>
                    <div style={{display:'flex',alignItems:'center',gap:10}}>
                      <div style={{width:36,height:36,borderRadius:'50%',background:u.color||'#555',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontFamily:"'Sora',sans-serif",fontWeight:800,fontSize:14,flexShrink:0}}>{u.name.charAt(0)}</div>
                      <div>
                        <div style={{fontFamily:"'Sora',sans-serif",fontSize:14,fontWeight:700}}>{u.name} {inactive&&<span style={{fontSize:10,color:'var(--ink3)'}}>(inativo)</span>}</div>
                        <div style={{fontSize:11,color:'var(--ink3)',marginTop:1}}>@{u.login} · <span style={{background:ROLE_COLORS[u.role]+'22',color:ROLE_COLORS[u.role],borderRadius:99,padding:'1px 7px',fontSize:10,fontWeight:700}}>{ROLES[u.role]||u.role}</span></div>
                      </div>
                    </div>
                    <div style={{display:'flex',gap:5,flexWrap:'wrap',justifyContent:'flex-end'}}>
                      <button onClick={()=>setEditKey(key)} style={{background:'#F0F0F0',color:'var(--ink)',borderRadius:'var(--rs)',padding:'5px 10px',fontSize:11,fontWeight:700}}>✏️ Editar</button>
                      <button onClick={()=>resetPwd(key)} style={{background:'#FEF3C7',color:'#92400E',borderRadius:'var(--rs)',padding:'5px 10px',fontSize:11,fontWeight:700}}>🔑 Senha</button>
                      <button onClick={()=>toggleActive(key)} style={{background:inactive?'#D1FAE5':'#FEE2E2',color:inactive?'#065F46':'#991B1B',borderRadius:'var(--rs)',padding:'5px 10px',fontSize:11,fontWeight:700}}>{inactive?'✅ Ativar':'⛔ Desativar'}</button>
                      {key!=='camila'&&key!=='bruna'&&<button onClick={()=>deleteUser(key)} style={{background:'#FEE2E2',color:'#991B1B',borderRadius:'var(--rs)',padding:'5px 10px',fontSize:11,fontWeight:700}}>🗑</button>}
                    </div>
                  </div>
                  <div style={{fontSize:11,color:'var(--ink3)',display:'flex',gap:12}}>
                    <span>{u.first?'⚠️ Troca de senha pendente':'✅ Senha configurada'}</span>
                  </div>
                </div>
              ):(
                <EditUserForm u={u} uKey={key} roles={ROLES} onSave={(fields)=>saveEdit(key,fields)} onCancel={()=>setEditKey(null)}/>
              )}
            </div>
          );
        })}
      </div>

      <div style={{margin:'12px 14px',padding:'12px 14px',background:'#F0F4FF',borderRadius:'var(--r)',border:'1.5px solid #BFDBFE',fontSize:12,color:'var(--ink2)',lineHeight:1.6}}>
        <b style={{color:'var(--blue)'}}>🛡️ Segurança:</b> Senhas são armazenadas localmente. Ao integrar com banco de dados (Supabase), as senhas serão criptografadas com bcrypt.
      </div>
    </div>
  );
}

  const [role,setRole]=useState(u.role);
  const [color,setColor]=useState(u.color||'#555555');

        <button onClick={()=>onSave({name,role,color})} style={{flex:1,padding:'10px',background:'var(--blue)',color:'#fff',borderRadius:'var(--rs)',fontFamily:"'Sora',sans-serif",fontSize:13,fontWeight:700}}>💾 Salvar</button>
        <button onClick={onCancel} style={{flex:1,padding:'10px',background:'#F0F0F0',color:'var(--ink)',borderRadius:'var(--rs)',fontFamily:"'Sora',sans-serif",fontSize:13,fontWeight:700}}>Cancelar</button>

function App(){
  const [phase,setPhase]=useState('loading');
  const [user,setUser]=useState(null);
  const [userKey,setUserKey]=useState(null);

  useEffect(()=>{
    const s=getSession();
    if(s){const users=getUsers(),u=users[s.key];if(u&&!u.first){setUser(u);setUserKey(s.key);setPhase('app');}else setPhase('login');}
    else setPhase('login');
  },[]);

  function onLogin(u,key){setUser(u);setUserKey(key);saveSession({key});setPhase('app');}
  function onLogout(){clearSession();setUser(null);setUserKey(null);setPhase('login');}

  if(phase==='loading')return <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#1A1A1A'}}><div style={{color:'#fff',fontFamily:"'Sora',sans-serif",fontSize:15}}>🥟 Carregando...</div></div>;
  if(phase==='login')return <Login onLogin={onLogin}/>;

  if(phase==='app'){
    if(user.role==='ceo') return <CEODashboard user={user} onLogout={onLogout}/>;
    if(user.role==='suporte') return <SuporteHub user={user} onLogout={onLogout}/>;
    if(user.role==='gerente') return <GerenteHub user={user} onLogout={onLogout}/>;
    return <ChecklistScreen user={user} onLogout={onLogout}/>;
  }
  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

<script>
if('serviceWorker' in navigator){
  const sw = `
    const CACHE = 'konclui-v1';
    const ASSETS = [location.href];
    self.addEventListener('install', e => {
      e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS)));
      self.skipWaiting();
    });
    self.addEventListener('fetch', e => {
      e.respondWith(
        caches.match(e.request).then(r => r || fetch(e.request).then(res => {
          const clone = res.clone();
          caches.open(CACHE).then(c => c.put(e.request, clone));
          return res;
        }).catch(() => caches.match(e.request)))
      );
    });
  `;
  const blob = new Blob([sw], {type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob))
    .catch(()=>{});
}
</script>
